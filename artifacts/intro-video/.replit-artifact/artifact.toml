kind = "video"
previewPath = "/intro-video/"
title = "AgentScrumMaster Intro Video"
version = "1.0.0"
id = "artifacts/intro-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/intro-video/" ]
localPort = 20930

[services.development]
run = "pnpm --filter @workspace/intro-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/intro-video", "run", "build" ]
publicDir = "artifacts/intro-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20930"
BASE_PATH = "/intro-video/"
